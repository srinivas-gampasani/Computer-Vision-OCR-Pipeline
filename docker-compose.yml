version: "3.9"

services:
  ocr-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cv-ocr-api
    ports:
      - "8000:8000"
    volumes:
      - ./backend/data:/app/data
    environment:
      - OCR_LANG=${OCR_LANG:-eng}
      - PREFER_PADDLE=${PREFER_PADDLE:-false}
      - DENOISE=${DENOISE:-true}
      - DESKEW=${DESKEW:-true}
      - BINARIZE=${BINARIZE:-true}
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  ocr-frontend:
    image: nginx:alpine
    container_name: cv-ocr-frontend
    ports:
      - "3000:80"
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
    depends_on:
      - ocr-api
    restart: unless-stopped
